# 服务器配置
server:
  port: 9527
  mode: debug  # debug, release, test
  # HTTPS 配置
  https:
    enabled: true
    cert_file: certs/server.crt
    key_file: certs/server.key

# 数据库配置
database:
  driver: mysql
  host: localhost
  port: 3306
  user: root
  password: root
  dbname: server_zzq
  maxIdleConns: 10
  maxOpenConns: 100

# Redis 配置
redis:
  host: localhost
  port: 6379
  password: ""
  db: 0

# JWT 配置
jwt:
  secret: your-secret-key-change-in-production
  expire: 7200  # 秒

# 微信配置
wechat:
  appid: your-wechat-appid
  secret: your-wechat-secret

# 日志配置
log:
  level: info  # debug, info, warn, error
  filename: stdout  # 输出到控制台，如需文件日志改为路径如：logs/server.log
  maxBackups: 3
  maxSize: 100  # MB
  maxAge: 30    # days
